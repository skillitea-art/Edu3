<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <title>Vedo — Connected Coaching Platform</title>
  <link rel="manifest" href="manifest.json" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root { color-scheme: light; }
    body { margin: 0; font-family: 'Inter', sans-serif; background: #f8fafc; color: #0f172a; }
    * { box-sizing: border-box; }
    .glass { background: rgba(255,255,255,0.9); backdrop-filter: blur(16px); border: 1px solid rgba(15,23,42,0.08); }
    .animate-in { animation: slideIn .25s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px);} to { opacity: 1; transform: translateY(0);} }
    :root[data-theme='dark'] { color-scheme: dark; }
    :root[data-theme='dark'] body { background: #020617; color: #e2e8f0; }
    :root[data-theme='dark'] .glass { background: rgba(15,23,42,0.75); border-color: rgba(255,255,255,0.1); }
    :root[data-theme='dark'] .bg-slate-950, :root[data-theme='dark'] .bg-slate-950\/80, :root[data-theme='dark'] .bg-slate-950\/70, :root[data-theme='dark'] .bg-slate-900, :root[data-theme='dark'] .bg-slate-900\/70, :root[data-theme='dark'] .bg-slate-900\/80, :root[data-theme='dark'] .bg-slate-800 { background-color: #0f172a !important; color: #e2e8f0 !important; }
    :root[data-theme='dark'] .text-slate-100, :root[data-theme='dark'] .text-slate-200, :root[data-theme='dark'] .text-slate-300, :root[data-theme='dark'] .text-slate-400 { color: #cbd5e1 !important; }
    :root[data-theme='light'] body { background: #f8fafc; color: #0f172a; }
    :root[data-theme='light'] .bg-slate-950, :root[data-theme='light'] .bg-slate-950\/80, :root[data-theme='light'] .bg-slate-950\/70, :root[data-theme='light'] .bg-slate-900, :root[data-theme='light'] .bg-slate-900\/70, :root[data-theme='light'] .bg-slate-900\/80, :root[data-theme='light'] .bg-slate-800 { background-color: #ffffff !important; color: #0f172a !important; }
    :root[data-theme='light'] .text-slate-100, :root[data-theme='light'] .text-slate-200, :root[data-theme='light'] .text-slate-300, :root[data-theme='light'] .text-slate-400 { color: #334155 !important; }
    :root[data-theme='light'] .text-white { color: #0f172a !important; }
    :root[data-theme='light'] .border-white\/10 { border-color: rgba(15,23,42,0.1) !important; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { createContext, useContext, useEffect, useMemo, useState } = React;
    const { createRoot } = ReactDOM;

    const StorageKeys = { USER: 'vedo_user', DATA: 'vedo_app_data' };

    const db = {
      get: (key, fallback) => {
        try {
          const raw = localStorage.getItem(key);
          return raw ? JSON.parse(raw) : fallback;
        } catch {
          return fallback;
        }
      },
      set: (key, value) => {
        try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
      }
    };

    const firebaseConfig = {
      apiKey: 'AIzaSyA81vHD1OouE3sPLzmgDUS_OH1waade5aY',
      authDomain: 'vedo-01.firebaseapp.com',
      projectId: 'vedo-01',
      storageBucket: 'vedo-01.firebasestorage.app',
      messagingSenderId: '1881105365',
      appId: '1:1881105365:web:9a016b072ff0b3c59ed35c'
    };

    let firestoreRef = null;
    let authRef = null;
    let backendReady = false;
    try {
      if (window.firebase?.apps?.length) {
        firebase.app();
      } else {
        firebase.initializeApp(firebaseConfig);
      }
      firestoreRef = firebase.firestore();
      authRef = firebase.auth();
      backendReady = true;
    } catch (error) {
      console.warn('Firebase unavailable, using local fallback.', error);
    }

    const initialState = {
      institutes: [
        { id: 'INS-001', name: 'Vedo Super Academy', city: 'Pune', description: 'Best coaching institute for boards and competitive exams.', ownerId: 'owner-demo', ownerName: 'Asha Owner', code: 'VEDO01', teacherIds: ['teacher-demo'], studentIds: ['student-demo'], classIds: ['CLS-001', 'CLS-002'], createdAt: stamp() },
        { id: 'INS-002', name: 'Bright Future Classes', city: 'Mumbai', description: 'JEE and NEET focused batches.', ownerId: 'owner-demo', ownerName: 'Asha Owner', code: 'BRIGHT', teacherIds: ['teacher-demo'], studentIds: [], classIds: ['CLS-003'], createdAt: stamp() }
      ],
      classes: [
        { id: 'CLS-001', instituteId: 'INS-001', ownerId: 'owner-demo', teacherId: 'teacher-demo', teacherName: 'Priya Kulkarni', name: 'Class 10 Semi-English', subject: 'Math', fee: 1800, schedule: 'Weekly', description: 'Board prep with live doubt solving.', code: 'CL10A', createdAt: stamp(), teacherIds: ['teacher-demo'], studentIds: ['student-demo'] },
        { id: 'CLS-002', instituteId: 'INS-001', ownerId: 'owner-demo', teacherId: 'teacher-demo', teacherName: 'Priya Kulkarni', name: 'Class 12 Science', subject: 'Physics', fee: 3500, schedule: 'Weekly', description: 'Premium science batch.', code: 'CL12S', createdAt: stamp(), teacherIds: ['teacher-demo'], studentIds: [] },
        { id: 'CLS-003', instituteId: 'INS-002', ownerId: 'owner-demo', teacherId: 'teacher-demo', teacherName: 'Priya Kulkarni', name: 'JEE Advanced Batch', subject: 'Chemistry', fee: 5000, schedule: 'Daily', description: 'Advanced practice batch.', code: 'JEE01', createdAt: stamp(), teacherIds: ['teacher-demo'], studentIds: [] }
      ],
      users: [
        { id: 'student-demo', role: 'student', name: 'Rahul Patil', email: 'student@vedo.app', instituteIds: ['INS-001'], classIds: ['CLS-001'], childId: 'student-demo', createdAt: stamp() },
        { id: 'teacher-demo', role: 'teacher', name: 'Priya Kulkarni', email: 'teacher@vedo.app', instituteIds: ['INS-001'], classIds: ['CLS-001', 'CLS-002'], createdAt: stamp() },
        { id: 'owner-demo', role: 'owner', name: 'Asha Owner', email: 'owner@vedo.app', instituteIds: ['INS-001', 'INS-002'], classIds: ['CLS-001', 'CLS-002', 'CLS-003'], createdAt: stamp() },
        { id: 'parent-demo', role: 'parent', name: 'Deepak Patil', email: 'parent@vedo.app', childId: 'student-demo', createdAt: stamp() }
      ],
      joinRequests: [
        { id: 'REQ-001', targetType: 'class', targetId: 'CLS-002', targetName: 'Class 12 Science', requesterId: 'student-demo', requesterName: 'Rahul Patil', role: 'student', status: 'pending', createdAt: stamp() },
        { id: 'REQ-002', targetType: 'class', targetId: 'CLS-003', targetName: 'JEE Advanced Batch', requesterId: 'teacher-demo', requesterName: 'Priya Kulkarni', role: 'teacher', status: 'pending', createdAt: stamp() }
      ],
      announcements: [
        { id: 'ANN-001', title: 'Physics Test', message: 'Physics test on 30 June for Chapter 10 and 11.', instituteId: 'INS-001', classId: 'CLS-002', createdBy: 'Asha Owner', createdAt: stamp() },
        { id: 'ANN-002', title: 'Holiday Update', message: 'Institute will remain closed on 15 July for maintenance.', instituteId: 'INS-001', classId: null, createdBy: 'Asha Owner', createdAt: stamp() }
      ],
      fees: [
        { id: 'FEE-001', studentId: 'student-demo', studentName: 'Rahul Patil', classId: 'CLS-001', amount: 3600, dueDate: '2026-07-01', status: 'pending', createdAt: stamp() },
        { id: 'FEE-002', studentId: 'student-demo', studentName: 'Rahul Patil', classId: 'CLS-001', amount: 1800, dueDate: '2026-08-01', status: 'pending', createdAt: stamp() }
      ],
      schedules: [
        { id: 'SCH-001', title: 'Math Session', time: '04:00 PM', classId: 'CLS-001', instituteId: 'INS-001', createdBy: 'Priya Kulkarni', createdAt: stamp() },
        { id: 'SCH-002', title: 'Physics Doubt Class', time: '06:00 PM', classId: 'CLS-002', instituteId: 'INS-001', createdBy: 'Priya Kulkarni', createdAt: stamp() }
      ],
      notes: [
        { id: 'NOTE-001', title: 'Quadratic Formula', content: 'Complete formula sheet for revision.', classId: 'CLS-001', instituteId: 'INS-001', createdBy: 'Priya Kulkarni', createdAt: stamp() },
        { id: 'NOTE-002', title: 'Ray Diagrams', content: 'Quick revision note for optics.', classId: 'CLS-002', instituteId: 'INS-001', createdBy: 'Priya Kulkarni', createdAt: stamp() }
      ],
      homeworks: [
        { id: 'HW-001', title: 'Solve 10 equations', description: 'Submit before Friday', dueDate: '2026-06-30', classId: 'CLS-001', instituteId: 'INS-001', createdBy: 'Priya Kulkarni', createdAt: stamp(), submissions: [] },
        { id: 'HW-002', title: 'Practice Numericals', description: 'Complete chapter 2 numericals', dueDate: '2026-07-02', classId: 'CLS-002', instituteId: 'INS-001', createdBy: 'Priya Kulkarni', createdAt: stamp(), submissions: [] }
      ],
      doubts: [
        { id: 'DOU-001', question: 'How do I solve quadratic equations?', classId: 'CLS-001', instituteId: 'INS-001', studentId: 'student-demo', studentName: 'Rahul Patil', status: 'open', createdAt: stamp() },
        { id: 'DOU-002', question: 'Explain Newton law with example.', classId: 'CLS-002', instituteId: 'INS-001', studentId: 'student-demo', studentName: 'Rahul Patil', status: 'open', createdAt: stamp() }
      ],
      feedbacks: [
        { id: 'FB-001', text: 'Great improvement in test performance.', studentId: 'student-demo', teacherId: 'teacher-demo', classId: 'CLS-001', instituteId: 'INS-001', createdAt: stamp() }
      ],
      marks: [
        { id: 'MARK-001', studentId: 'student-demo', studentName: 'Rahul Patil', title: 'Unit Test 1', score: 82, maxScore: 100, classId: 'CLS-001', instituteId: 'INS-001', createdAt: stamp() }
      ]
    };

    const roleLabels = { student: 'Student', teacher: 'Teacher', owner: 'Owner', parent: 'Parent' };

    const AuthContext = createContext(null);
    const NavContext = createContext(null);
    const ToastContext = createContext(null);
    const AppDataContext = createContext(null);
    const ThemeContext = createContext(null);

    function useAuth() { return useContext(AuthContext); }
    function useNav() { return useContext(NavContext); }
    function useToast() { return useContext(ToastContext); }
    function useAppData() { return useContext(AppDataContext); }
    function useTheme() { return useContext(ThemeContext); }

    function ThemeProvider({ children }) {
      const [theme, setTheme] = useState(() => db.get('vedo_theme', 'light'));
      useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme);
        document.body.setAttribute('data-theme', theme);
        db.set('vedo_theme', theme);
      }, [theme]);
      const toggleTheme = () => setTheme((prev) => (prev === 'light' ? 'dark' : 'light'));
      return <ThemeContext.Provider value={{ theme, toggleTheme }}>{children}</ThemeContext.Provider>;
    }

    function generateCode(length = 6) {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let code = '';
      for (let i = 0; i < length; i += 1) code += chars.charAt(Math.floor(Math.random() * chars.length));
      return code;
    }

    function stamp() {
      return new Date().toISOString();
    }

    function NavProvider({ children }) {
      const [currentPath, setCurrentPath] = useState(() => window.location.hash.replace('#', '') || '/discover');
      const navigateTo = (path) => {
        setCurrentPath(path);
        window.history.pushState({}, '', '#' + path);
      };
      useEffect(() => {
        const onPop = () => {
          const next = window.location.hash.replace('#', '') || '/discover';
          setCurrentPath(next);
        };
        window.addEventListener('popstate', onPop);
        return () => window.removeEventListener('popstate', onPop);
      }, []);
      return <NavContext.Provider value={{ currentPath, navigateTo }}>{children}</NavContext.Provider>;
    }

    function ToastProvider({ children }) {
      const [toasts, setToasts] = useState([]);
      const addToast = (message, tone = 'info') => {
        const id = Date.now() + Math.random();
        setToasts((prev) => [...prev, { id, message, tone }]);
        window.setTimeout(() => setToasts((prev) => prev.filter((item) => item.id !== id)), 2800);
      };
      return (
        <ToastContext.Provider value={{ addToast }}>
          {children}
          <div className="fixed right-3 top-3 z-[80] flex flex-col gap-2 w-[90vw] max-w-sm">
            {toasts.map((toast) => (
              <div key={toast.id} className={`rounded-2xl border px-3 py-2 text-sm shadow-xl animate-in ${toast.tone === 'success' ? 'border-emerald-500/40 bg-emerald-600/95 text-white' : toast.tone === 'error' ? 'border-rose-500/40 bg-rose-600/95 text-white' : 'border-indigo-500/40 bg-slate-900/95 text-slate-100'}`}>
                {toast.message}
              </div>
            ))}
          </div>
        </ToastContext.Provider>
      );
    }

    function AppDataProvider({ children }) {
      const [institutes, setInstitutes] = useState(() => db.get(StorageKeys.DATA, initialState)?.institutes || initialState.institutes);
      const [classes, setClasses] = useState(() => db.get(StorageKeys.DATA, initialState)?.classes || initialState.classes);
      const [users, setUsers] = useState(() => db.get(StorageKeys.DATA, initialState)?.users || initialState.users);
      const [joinRequests, setJoinRequests] = useState(() => db.get(StorageKeys.DATA, initialState)?.joinRequests || initialState.joinRequests);
      const [announcements, setAnnouncements] = useState(() => db.get(StorageKeys.DATA, initialState)?.announcements || initialState.announcements);
      const [fees, setFees] = useState(() => db.get(StorageKeys.DATA, initialState)?.fees || initialState.fees);
      const [schedules, setSchedules] = useState(() => db.get(StorageKeys.DATA, initialState)?.schedules || initialState.schedules);
      const [notes, setNotes] = useState(() => db.get(StorageKeys.DATA, initialState)?.notes || initialState.notes);
      const [homeworks, setHomeworks] = useState(() => db.get(StorageKeys.DATA, initialState)?.homeworks || initialState.homeworks);
      const [doubts, setDoubts] = useState(() => db.get(StorageKeys.DATA, initialState)?.doubts || initialState.doubts);
      const [feedbacks, setFeedbacks] = useState(() => db.get(StorageKeys.DATA, initialState)?.feedbacks || initialState.feedbacks);
      const [marks, setMarks] = useState(() => db.get(StorageKeys.DATA, initialState)?.marks || initialState.marks);

      useEffect(() => {
        if (!backendReady || !firestoreRef) return;
        const unsubs = [];
        const attach = (collectionName, setter) => {
          const unsub = firestoreRef.collection(collectionName).orderBy('createdAt', 'desc').onSnapshot((snapshot) => {
            setter(snapshot.docs.map((doc) => ({ id: doc.id, ...doc.data() })));
          });
          unsubs.push(unsub);
        };
        attach('institutes', setInstitutes);
        attach('classes', setClasses);
        attach('users', setUsers);
        attach('joinRequests', setJoinRequests);
        attach('announcements', setAnnouncements);
        attach('fees', setFees);
        attach('schedules', setSchedules);
        attach('notes', setNotes);
        attach('homeworks', setHomeworks);
        attach('doubts', setDoubts);
        attach('feedbacks', setFeedbacks);
        attach('marks', setMarks);
        return () => unsubs.forEach((fn) => fn());
      }, []);

      useEffect(() => {
        db.set(StorageKeys.DATA, { institutes, classes, users, joinRequests, announcements, fees, schedules, notes, homeworks, doubts, feedbacks, marks });
      }, [institutes, classes, users, joinRequests, announcements, fees, schedules, notes, homeworks, doubts, feedbacks, marks]);

      const saveDoc = async (collectionName, item) => {
        if (!backendReady || !firestoreRef) return item;
        const id = item.id || `${collectionName}-${Date.now()}`;
        const payload = { ...item, id };
        await firestoreRef.collection(collectionName).doc(id).set(payload);
        return payload;
      };

      const updateUser = async (userDoc) => {
        if (!backendReady || !firestoreRef) {
          setUsers((prev) => [userDoc, ...prev.filter((item) => item.id !== userDoc.id)]);
          return;
        }
        const payload = { ...userDoc, id: userDoc.id };
        await firestoreRef.collection('users').doc(userDoc.id).set(payload, { merge: true });
        setUsers((prev) => [payload, ...prev.filter((item) => item.id !== userDoc.id)]);
      };

      const createInstitute = async ({ name, city, description, ownerId, ownerName }) => {
        const institute = { id: `INS-${Date.now()}`, name, city, description, ownerId, ownerName, code: generateCode(), createdAt: stamp(), teacherIds: [], studentIds: [], classIds: [] };
        setInstitutes((prev) => [institute, ...prev]);
        if (backendReady && firestoreRef) await firestoreRef.collection('institutes').doc(institute.id).set(institute);
        if (ownerId) {
          const ownerDoc = users.find((item) => item.id === ownerId) || { id: ownerId, role: 'owner', instituteIds: [] };
          const nextOwner = { ...ownerDoc, instituteIds: [...new Set([...(ownerDoc.instituteIds || []), institute.id])] };
          await updateUser(nextOwner);
        }
        return institute;
      };

      const createClass = async ({ instituteId, ownerId, teacherId, teacherName, name, subject, fee, schedule, description }) => {
        const cls = { id: `CLS-${Date.now()}`, instituteId: instituteId || null, ownerId: ownerId || null, teacherId: teacherId || null, teacherName: teacherName || '', name, subject, fee: Number(fee || 0), schedule: schedule || 'Weekly', description: description || '', code: generateCode(), createdAt: stamp(), teacherIds: teacherId ? [teacherId] : [], studentIds: [] };
        setClasses((prev) => [cls, ...prev]);
        if (backendReady && firestoreRef) await firestoreRef.collection('classes').doc(cls.id).set(cls);
        if (instituteId) {
          setInstitutes((prev) => prev.map((item) => item.id === instituteId ? { ...item, classIds: [...new Set([...(item.classIds || []), cls.id])] } : item));
        }
        if (teacherId) {
          const teacherDoc = users.find((item) => item.id === teacherId) || { id: teacherId, role: 'teacher', classIds: [] };
          const nextTeacher = { ...teacherDoc, classIds: [...new Set([...(teacherDoc.classIds || []), cls.id])] };
          await updateUser(nextTeacher);
        }
        return cls;
      };

      const createJoinRequest = async ({ targetType, targetId, targetName, requesterId, requesterName, role }) => {
        const payload = { id: `REQ-${Date.now()}`, targetType, targetId, targetName, requesterId, requesterName, role, status: 'pending', createdAt: stamp() };
        setJoinRequests((prev) => [payload, ...prev]);
        if (backendReady && firestoreRef) await firestoreRef.collection('joinRequests').doc(payload.id).set(payload);
        return payload;
      };

      const approveRequest = async (requestId) => {
        const request = joinRequests.find((item) => item.id === requestId);
        if (!request) return;
        const nextStatus = 'approved';
        setJoinRequests((prev) => prev.map((item) => item.id === requestId ? { ...item, status: nextStatus, updatedAt: stamp() } : item));
        if (backendReady && firestoreRef) await firestoreRef.collection('joinRequests').doc(requestId).set({ ...request, status: nextStatus, updatedAt: stamp() }, { merge: true });
        const targetUser = users.find((item) => item.id === request.requesterId) || { id: request.requesterId, role: request.role, instituteIds: [], classIds: [] };
        const updatedUser = {
          ...targetUser,
          role: request.role,
          instituteIds: request.targetType === 'institute' ? [...new Set([...(targetUser.instituteIds || []), request.targetId])] : targetUser.instituteIds || [],
          classIds: request.targetType === 'class' ? [...new Set([...(targetUser.classIds || []), request.targetId])] : targetUser.classIds || []
        };
        await updateUser(updatedUser);
        if (request.targetType === 'institute') {
          setInstitutes((prev) => prev.map((item) => item.id === request.targetId ? {
            ...item,
            studentIds: request.role === 'student' ? [...new Set([...(item.studentIds || []), request.requesterId])] : item.studentIds || [],
            teacherIds: request.role === 'teacher' ? [...new Set([...(item.teacherIds || []), request.requesterId])] : item.teacherIds || []
          } : item));
        }
        if (request.targetType === 'class') {
          setClasses((prev) => prev.map((item) => item.id === request.targetId ? {
            ...item,
            studentIds: request.role === 'student' ? [...new Set([...(item.studentIds || []), request.requesterId])] : item.studentIds || [],
            teacherIds: request.role === 'teacher' ? [...new Set([...(item.teacherIds || []), request.requesterId])] : item.teacherIds || []
          } : item));
        }
        if (request.role === 'student') {
          const fee = { id: `FEE-${Date.now()}`, studentId: request.requesterId, studentName: request.requesterName, classId: request.targetType === 'class' ? request.targetId : null, status: 'pending', amount: 0, dueDate: stamp().slice(0, 10), createdAt: stamp() };
          setFees((prev) => [fee, ...prev]);
          if (backendReady && firestoreRef) await firestoreRef.collection('fees').doc(fee.id).set(fee);
        }
      };

      const rejectRequest = async (requestId) => {
        setJoinRequests((prev) => prev.map((item) => item.id === requestId ? { ...item, status: 'rejected' } : item));
        if (backendReady && firestoreRef) await firestoreRef.collection('joinRequests').doc(requestId).set({ status: 'rejected' }, { merge: true });
      };

      const createAnnouncement = async ({ title, message, instituteId, classId, createdBy }) => {
        const payload = { id: `ANN-${Date.now()}`, title, message, instituteId: instituteId || null, classId: classId || null, createdBy, createdAt: stamp() };
        setAnnouncements((prev) => [payload, ...prev]);
        if (backendReady && firestoreRef) await firestoreRef.collection('announcements').doc(payload.id).set(payload);
        return payload;
      };

      const createFee = async ({ studentId, studentName, classId, amount, dueDate }) => {
        const payload = { id: `FEE-${Date.now()}`, studentId, studentName, classId: classId || null, amount: Number(amount || 0), dueDate, status: 'pending', createdAt: stamp() };
        setFees((prev) => [payload, ...prev]);
        if (backendReady && firestoreRef) await firestoreRef.collection('fees').doc(payload.id).set(payload);
        return payload;
      };

      const createSchedule = async ({ title, time, classId, instituteId, createdBy }) => {
        const payload = { id: `SCH-${Date.now()}`, title, time, classId: classId || null, instituteId: instituteId || null, createdBy, createdAt: stamp() };
        setSchedules((prev) => [payload, ...prev]);
        if (backendReady && firestoreRef) await firestoreRef.collection('schedules').doc(payload.id).set(payload);
        return payload;
      };

      const createNote = async ({ title, content, classId, instituteId, createdBy }) => {
        const payload = { id: `NOTE-${Date.now()}`, title, content, classId: classId || null, instituteId: instituteId || null, createdBy, createdAt: stamp() };
        setNotes((prev) => [payload, ...prev]);
        if (backendReady && firestoreRef) await firestoreRef.collection('notes').doc(payload.id).set(payload);
        return payload;
      };

      const createHomework = async ({ title, description, dueDate, classId, instituteId, createdBy }) => {
        const payload = { id: `HW-${Date.now()}`, title, description, dueDate, classId: classId || null, instituteId: instituteId || null, createdBy, createdAt: stamp(), submissions: [] };
        setHomeworks((prev) => [payload, ...prev]);
        if (backendReady && firestoreRef) await firestoreRef.collection('homeworks').doc(payload.id).set(payload);
        return payload;
      };

      const submitHomework = async ({ homeworkId, studentId, studentName, status }) => {
        setHomeworks((prev) => prev.map((item) => item.id === homeworkId ? { ...item, submissions: [...(item.submissions || []), { studentId, studentName, status, submittedAt: stamp() }] } : item));
        if (backendReady && firestoreRef) {
          const homeworkDoc = await firestoreRef.collection('homeworks').doc(homeworkId).get();
          if (homeworkDoc.exists) {
            const data = homeworkDoc.data();
            await firestoreRef.collection('homeworks').doc(homeworkId).set({ ...data, submissions: [...(data.submissions || []), { studentId, studentName, status, submittedAt: stamp() }] }, { merge: true });
          }
        }
      };

      const addDoubt = async ({ question, classId, instituteId, studentId, studentName }) => {
        const payload = { id: `DOU-${Date.now()}`, question, classId: classId || null, instituteId: instituteId || null, studentId, studentName, status: 'open', createdAt: stamp() };
        setDoubts((prev) => [payload, ...prev]);
        if (backendReady && firestoreRef) await firestoreRef.collection('doubts').doc(payload.id).set(payload);
        return payload;
      };

      const addFeedback = async ({ text, studentId, teacherId, classId, instituteId }) => {
        const payload = { id: `FB-${Date.now()}`, text, studentId, teacherId, classId: classId || null, instituteId: instituteId || null, createdAt: stamp() };
        setFeedbacks((prev) => [payload, ...prev]);
        if (backendReady && firestoreRef) await firestoreRef.collection('feedbacks').doc(payload.id).set(payload);
        return payload;
      };

      const addMark = async ({ studentId, studentName, title, score, maxScore, classId, instituteId }) => {
        const payload = { id: `MARK-${Date.now()}`, studentId, studentName, title, score: Number(score || 0), maxScore: Number(maxScore || 0), classId: classId || null, instituteId: instituteId || null, createdAt: stamp() };
        setMarks((prev) => [payload, ...prev]);
        if (backendReady && firestoreRef) await firestoreRef.collection('marks').doc(payload.id).set(payload);
        return payload;
      };

      const value = { institutes, classes, users, joinRequests, announcements, fees, schedules, notes, homeworks, doubts, feedbacks, marks, createInstitute, createClass, createJoinRequest, approveRequest, rejectRequest, createAnnouncement, createFee, createSchedule, createNote, createHomework, submitHomework, addDoubt, addFeedback, addMark, updateUser };

    function AuthProvider({ children }) {
      const { navigateTo } = useNav();
      const { createInstitute, updateUser } = useAppData();
      const [authUser, setAuthUser] = useState(null);
      const [profile, setProfile] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        if (!backendReady || !authRef) {
          setLoading(false);
          return;
        }
        const unsubscribe = authRef.onAuthStateChanged(async (user) => {
          setAuthUser(user);
          if (!user) {
            setProfile(null);
            setLoading(false);
            return;
          }
          const snapshot = await firestoreRef.collection('users').doc(user.uid).get();
          if (snapshot.exists) {
            const data = snapshot.data();
            setProfile({ id: user.uid, ...data });
          } else {
            setProfile({ id: user.uid, role: 'student', name: user.email, instituteIds: [], classIds: [] });
          }
          setLoading(false);
        });
        return unsubscribe;
      }, []);

      const login = async (email, password) => {
        const demoProfiles = {
          'student@vedo.app': { profile: { id: 'student-demo', role: 'student', name: 'Rahul Patil', email, instituteIds: ['INS-001'], classIds: ['CLS-001'] }, password: 'student123' },
          'teacher@vedo.app': { profile: { id: 'teacher-demo', role: 'teacher', name: 'Priya Kulkarni', email, instituteIds: ['INS-001'], classIds: ['CLS-001', 'CLS-002'] }, password: 'teacher123' },
          'owner@vedo.app': { profile: { id: 'owner-demo', role: 'owner', name: 'Asha Owner', email, instituteIds: ['INS-001', 'INS-002'], classIds: ['CLS-001', 'CLS-002', 'CLS-003'] }, password: 'admin123' },
          'parent@vedo.app': { profile: { id: 'parent-demo', role: 'parent', name: 'Deepak Patil', email, childId: 'student-demo' }, password: 'parent123' }
        };
        if (!backendReady || !authRef) {
          const demo = demoProfiles[email];
          if (demo && demo.password === password) {
            setProfile(demo.profile);
            setAuthUser({ uid: demo.profile.id, email });
            const target = demo.profile.role === 'owner' ? '/owner' : demo.profile.role === 'teacher' ? '/teacher' : demo.profile.role === 'parent' ? '/parent' : '/student';
            navigateTo(target);
            return { ok: true };
          }
          return { ok: false, message: 'Demo login unavailable. Try student@vedo.app / student123.' };
        }
        try {
          const result = await authRef.signInWithEmailAndPassword(email, password);
          const snapshot = await firestoreRef.collection('users').doc(result.user.uid).get();
          const profileData = snapshot.exists ? { id: result.user.uid, ...snapshot.data() } : { id: result.user.uid, role: 'student', name: result.user.email, instituteIds: [], classIds: [] };
          setProfile(profileData);
          setAuthUser(result.user);
          const target = profileData.role === 'owner' ? '/owner' : profileData.role === 'teacher' ? '/teacher' : profileData.role === 'parent' ? '/parent' : '/student';
          navigateTo(target);
          return { ok: true };
        } catch (error) {
          return { ok: false, message: error.message || 'Login failed.' };
        }
      };

      const signup = async ({ email, password, role, name, instituteName, city }) => {
        if (!backendReady || !authRef) {
          const profileData = { id: `${role}-${Date.now()}`, role, name, email, instituteIds: [], classIds: [], createdAt: stamp() };
          setProfile(profileData);
          setAuthUser({ uid: profileData.id, email });
          if (role === 'owner' && instituteName) {
            await createInstitute({ name: instituteName, city: city || 'Pune', description: 'New institute created from signup.', ownerId: profileData.id, ownerName: name });
          }
          const target = role === 'owner' ? '/owner' : role === 'teacher' ? '/teacher' : role === 'parent' ? '/parent' : '/student';
          navigateTo(target);
          return { ok: true };
        }
        try {
          const result = await authRef.createUserWithEmailAndPassword(email, password);
          const profileData = { id: result.user.uid, authUid: result.user.uid, email, name, role, instituteIds: [], classIds: [], createdAt: stamp() };
          await firestoreRef.collection('users').doc(result.user.uid).set(profileData);

          setAuthUser(result.user);
          if (role === 'owner' && instituteName) {
            await createInstitute({ name: instituteName, city: city || 'Pune', description: 'New institute created from signup.', ownerId: result.user.uid, ownerName: name });
          }
          const target = role === 'owner' ? '/owner' : role === 'teacher' ? '/teacher' : role === 'parent' ? '/parent' : '/student';
          navigateTo(target);
          return { ok: true };
        } catch (error) {
          return { ok: false, message: error.message || 'Signup failed.' };
        }
      };

      const logout = async () => {
        if (authRef) await authRef.signOut();

    function StudentDashboard() {
      const { profile } = useAuth();
      const { institutes, classes, joinRequests, announcements, fees, notes, homeworks, marks, doubts, createJoinRequest, submitHomework, addDoubt } = useAppData();
      const [joinCode, setJoinCode] = useState('');
      const [activeTab, setActiveTab] = useState('home');
      const [doubtText, setDoubtText] = useState('');
      const { addToast } = useToast();
      const approvedMemberships = joinRequests.filter((item) => item.requesterId === profile?.id && item.status === 'approved');
      const visibleInstitutes = institutes.filter((item) => item.studentIds?.includes(profile?.id) || item.teacherIds?.includes(profile?.id) || approvedMemberships.some((req) => req.targetType === 'institute' && req.targetId === item.id) || item.id === profile?.instituteIds?.[0]);
      const visibleClasses = classes.filter((item) => item.studentIds?.includes(profile?.id) || item.teacherIds?.includes(profile?.id) || approvedMemberships.some((req) => req.targetType === 'class' && req.targetId === item.id) || item.id === profile?.classIds?.[0]);
      const joinByCode = async (targetType) => {
        const target = targetType === 'class' ? classes.find((item) => item.code?.toLowerCase() === joinCode.toLowerCase()) : institutes.find((item) => item.code?.toLowerCase() === joinCode.toLowerCase());
        if (!target) return addToast('No matching class or institute was found', 'error');
        await createJoinRequest({ targetType, targetId: target.id, targetName: target.name, requesterId: profile.id, requesterName: profile.name, role: 'student' });
        addToast('Join request sent to the owner', 'success');
      };
      const submitSelectedHomework = async (homeworkIdValue) => {
        if (!homeworkIdValue) return;
        await submitHomework({ homeworkId: homeworkIdValue, studentId: profile.id, studentName: profile.name, status: 'submitted' });
        addToast('Homework submitted', 'success');
      };
      const saveDoubt = async (event) => {
        event.preventDefault();
        if (!doubtText.trim()) return;
        await addDoubt({ question: doubtText, studentId: profile.id, studentName: profile.name, classId: visibleClasses[0]?.id || null, instituteId: visibleInstitutes[0]?.id || null });
        setDoubtText('');
        addToast('Doubt posted to the teacher', 'success');
      };

            {activeTab === 'overview' && <div className="grid gap-4 xl:grid-cols-2"><div className="glass rounded-3xl border border-white/10 p-5"><h3 className="text-lg font-semibold">Create institute</h3><form onSubmit={addInstitute} className="mt-3 space-y-3"><input value={instituteName} onChange={(event) => setInstituteName(event.target.value)} placeholder="Institute name" required className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm" /><input value={city} onChange={(event) => setCity(event.target.value)} placeholder="City" className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm" /><button className="rounded-full bg-indigo-600 px-3 py-2 text-sm">Create institute</button></form></div><div className="glass rounded-3xl border border-white/10 p-5"><h3 className="text-lg font-semibold">Announcements</h3><div className="mt-3 space-y-2">{announcements.slice(0, 4).map((item) => <div key={item.id} className="rounded-2xl border border-white/10 bg-slate-900/70 p-3"><div className="font-medium">{item.title}</div><div className="text-sm text-slate-400">{item.message}</div></div>)}</div></div></div>}
            {activeTab === 'requests' && <div className="glass rounded-3xl border border-white/10 p-5"><h3 className="text-lg font-semibold">Pending approvals</h3><div className="mt-3 space-y-2">{relevantRequests.length ? relevantRequests.map((item) => <div key={item.id} className="rounded-2xl border border-white/10 bg-slate-900/70 p-3"><div className="font-medium">{item.requesterName} wants to join</div><div className="text-sm text-slate-400">{item.targetName}</div>{item.status === 'pending' ? <div className="mt-2 flex gap-2"><button onClick={() => approveRequest(item.id)} className="rounded-full bg-emerald-600 px-3 py-2 text-xs">Approve</button><button onClick={() => rejectRequest(item.id)} className="rounded-full bg-rose-500 px-3 py-2 text-xs">Reject</button></div> : <div className="mt-2 text-xs font-medium text-emerald-400">{item.status === 'approved' ? 'Approved' : 'Rejected'}</div>}</div>) : <div className="text-sm text-slate-400">No requests yet.</div>}</div></div>}
            {activeTab === 'batches' && <div className="glass rounded-3xl border border-white/10 p-5"><h3 className="text-lg font-semibold">Create batch</h3><form onSubmit={addClass} className="mt-3 space-y-3"><select value={selectedInstitute} onChange={(event) => setSelectedInstitute(event.target.value)} className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm"><option value="">Select institute</option>{myInstitutes.map((item) => <option key={item.id} value={item.id}>{item.name}</option>)}</select><input value={className} onChange={(event) => setClassName(event.target.value)} placeholder="Batch name" required className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm" /><input value={subject} onChange={(event) => setSubject(event.target.value)} placeholder="Subject" className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm" /><input value={fee} onChange={(event) => setFee(event.target.value)} placeholder="Fee" className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm" /><input value={scheduleText} onChange={(event) => setScheduleText(event.target.value)} placeholder="Schedule" className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm" /><button className="rounded-full bg-emerald-600 px-3 py-2 text-sm">Create batch</button></form><div className="mt-4 space-y-2">{classes.filter((item) => item.ownerId === profile?.id).slice(0, 6).map((item) => <div key={item.id} className="rounded-2xl border border-white/10 bg-slate-900/70 p-3"><div className="font-medium">{item.name}</div><div className="text-sm text-slate-400">Fee: {item.fee} • Code: {item.code}</div></div>)}</div></div>}
            {activeTab === 'announcements' && <div className="glass rounded-3xl border border-white/10 p-5"><h3 className="text-lg font-semibold">Send notification</h3><form onSubmit={sendAnnouncement} className="mt-3 space-y-3"><input value={announcementTitle} onChange={(event) => setAnnouncementTitle(event.target.value)} placeholder="Title" required className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm" /><textarea value={announcementBody} onChange={(event) => setAnnouncementBody(event.target.value)} placeholder="Message" className="min-h-24 w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm" /><select value={selectedClass} onChange={(event) => setSelectedClass(event.target.value)} className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm"><option value="">All batches</option>{classes.filter((item) => item.ownerId === profile?.id).map((item) => <option key={item.id} value={item.id}>{item.name}</option>)}</select><button className="rounded-full bg-indigo-600 px-3 py-2 text-sm">Send notification</button></form></div>}
            {activeTab === 'fees' && <div className="glass rounded-3xl border border-white/10 p-5"><h3 className="text-lg font-semibold">Fee reminders</h3><form onSubmit={addNewFee} className="mt-3 space-y-3"><input value={fee} onChange={(event) => setFee(event.target.value)} placeholder="Fee amount" className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm" /><button className="rounded-full bg-amber-500 px-3 py-2 text-sm">Create reminder</button></form><div className="mt-4 space-y-2">{fees.slice(0, 6).map((item) => <div key={item.id} className="rounded-2xl border border-white/10 bg-slate-900/70 p-3"><div className="font-medium">₹{item.amount}</div><div className="text-sm text-slate-400">Due: {item.dueDate} • {item.studentName}</div></div>)}</div></div>}
            {activeTab === 'settings' && <div className="glass rounded-3xl border border-white/10 p-5"><h3 className="text-lg font-semibold">Settings</h3><div className="mt-3 rounded-2xl border border-white/10 bg-slate-900/70 p-4 text-sm text-slate-300">Owner controls are now directly available from the bottom bar for institute, batch, alert and fee management.</div></div>}
            <BottomNavBar items={tabs} active={activeTab} onChange={setActiveTab} />
          </div>
        </ScreenShell>
      );
    }

    function ParentDashboard() {
      const { profile } = useAuth();
      const { users, fees, announcements, marks } = useAppData();
      const [activeTab, setActiveTab] = useState('overview');
      const child = users.find((item) => item.id === profile?.childId || item.parentId === profile?.id) || null;
      const tabs = [
        { id: 'overview', label: 'Overview', icon: '👪' },
        { id: 'progress', label: 'Progress', icon: '📊' },
        { id: 'attendance', label: 'Attendance', icon: '📅' },
        { id: 'fees', label: 'Fees', icon: '💰' },
        { id: 'contact', label: 'Contact', icon: '💬' }
      ];
      return (
        <ScreenShell title="Parent dashboard" subtitle="Track your child's learning journey from one place." right={<div className="rounded-full border border-amber-400/20 bg-amber-500/10 px-3 py-2 text-sm text-amber-200">{profile?.name || 'Parent'}</div>}>
          <div className="space-y-5">
            <div className="glass rounded-3xl border border-white/10 p-5">
              <h2 className="text-xl font-semibold">Child overview</h2>
              <div className="mt-3 rounded-2xl border border-white/10 bg-slate-900/70 p-3">
                <div className="font-medium">{child?.name || 'No linked child yet'}</div>
                <div className="text-sm text-slate-400">{child?.role || 'Pending'}</div>
              </div>
            </div>
            {activeTab === 'overview' && <div className="glass rounded-3xl border border-white/10 p-5"><h3 className="text-lg font-semibold">Recent notices</h3><div className="mt-3 space-y-2">{announcements.slice(0, 4).map((item) => <div key={item.id} className="rounded-2xl border border-white/10 bg-slate-900/70 p-3"><div className="font-medium">{item.title}</div><div className="text-sm text-slate-400">{item.message}</div></div>)}</div></div>}
            {activeTab === 'progress' && <div className="glass rounded-3xl border border-white/10 p-5"><h3 className="text-lg font-semibold">Performance</h3><div className="mt-3 space-y-2">{marks.filter((item) => item.studentId === child?.id).slice(0, 4).map((item) => <div key={item.id} className="rounded-2xl border border-white/10 bg-slate-900/70 p-3"><div className="font-medium">{item.title}</div><div className="text-sm text-slate-400">Score: {item.score}/{item.maxScore}</div></div>)}</div></div>}
            {activeTab === 'attendance' && <div className="glass rounded-3xl border border-white/10 p-5"><h3 className="text-lg font-semibold">Attendance summary</h3><div className="mt-3 rounded-2xl border border-white/10 bg-slate-900/70 p-4 text-sm text-slate-300">Attendance updates and class presence are tracked automatically for the linked child.</div></div>}
            {activeTab === 'fees' && <div className="glass rounded-3xl border border-white/10 p-5"><h3 className="text-lg font-semibold">Fees & notices</h3><div className="mt-3 space-y-2">{fees.filter((item) => item.studentId === child?.id).map((item) => <div key={item.id} className="rounded-2xl border border-white/10 bg-slate-900/70 p-3"><div className="font-medium">₹{item.amount}</div><div className="text-sm text-slate-400">{item.dueDate}</div></div>)}</div></div>}
            {activeTab === 'contact' && <div className="glass rounded-3xl border border-white/10 p-5"><h3 className="text-lg font-semibold">Contact support</h3><div className="mt-3 rounded-2xl border border-white/10 bg-slate-900/70 p-4 text-sm text-slate-300">Use the institute owner and teacher contact routes from inside the main app to reach the team quickly.</div></div>}
            <BottomNavBar items={tabs} active={activeTab} onChange={setActiveTab} />
          </div>
        </ScreenShell>
      );
    }

    function AppRouter() {
      const { currentPath } = useNav();
      const { profile, loading } = useAuth();
      const isPublicRoute = currentPath === '/discover' || currentPath === '/' || currentPath === '';
      const isAuthRoute = currentPath === '/auth' || currentPath === '/login' || currentPath === '/signup';

      if (loading) return <div className="flex min-h-screen items-center justify-center bg-slate-950 text-slate-100">Loading your workspace...</div>;
      if (isAuthRoute) return <AuthScreen />;
      if (!profile) return <DiscoverScreen />;
      if (isPublicRoute) return <DiscoverScreen />;
      if (currentPath === '/owner') return <OwnerDashboard />;
      if (currentPath === '/teacher') return <TeacherDashboard />;
      if (currentPath === '/parent') return <ParentDashboard />;
      if (currentPath === '/student' || currentPath.startsWith('/student')) return <StudentDashboard />;
      return <StudentDashboard />;
    }

    function App() {
      return (
        <ThemeProvider>
          <NavProvider>
            <ToastProvider>
              <AppDataProvider>
                <AuthProvider>
                  <AppRouter />
                </AuthProvider>
              </AppDataProvider>
            </ToastProvider>
          </NavProvider>
        </ThemeProvider>
      );
    }

    createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
